services:
  mongodb:
    image: mongo:7
    container_name: monew-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      - mongodb
    restart: "no"
    entrypoint: >
      bash -c "
      sleep 5 &&
      mongosh --host mongodb:27017 --eval
      'try {
        rs.status();
      } catch (e) {
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"localhost:27017\" }]
        });
      }'
      "

volumes:
  mongo-data:
