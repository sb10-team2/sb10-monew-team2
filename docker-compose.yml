version: "3.9"

services:
  app:
    build:
      #현재 프로젝트의 Dockerfile 기반으로 Spring Boot 이미지 빌드
      context: .
      dockerfile: Dockerfile
    container_name: monew-app

    #PostgreSQL, MongoDB가 준비된 뒤 app 실행
    depends_on:
      db:
        condition: service_healthy    #db 컨테이너가 "헬스체크 통과" 상태일때 app실행
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully

    #호스트포트:컨테이너 포트
    #Dockerfile에서 --server.port=80으로 실행중이면 컨테이너 내부 포트는 80
    ports:
      - "${APP_PORT}:80"
    environment:
      #application.yml의 spring.profiles.active 값을 덮어쓴다.(dev or prod)
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      #application-dev.yml의 MONGODB_URI 기본값은 localhost라서 컨테이너 환경에서는 덮어써야 함
      #mongodb는 아래 MongoDB 서비스명
      # replicaSet=rs0은 MongoDB 트랜잭션/replica set 사용을 위해 필요
      MONGODB_URI: mongodb://mongodb:27017/monew?replicaSet=rs0

      #app 컨테이너 내부에서는 localhost가 아니라 db 서비스명으로 접근해야한다.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      NAVER_API_KEY: ${NAVER_API_KEY}
      NAVER_API_SECRET: ${NAVER_API_SECRET}
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PRESIGNED_URL_EXPIRATION: ${AWS_S3_PRESIGNED_URL_EXPIRATION}

    # app이 비정상 종료되면 자동 재시작
    restart: unless-stopped

  #PostgreSQL DB
  db:
    image: postgres:16
    container_name: monew-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #DB가 container화 되면 DataGrip(외부)에서 접근에 제한되기 때문에 port를 설정해서 접근하도록 함.
    #로컬 DB를 5432쓰고 있다면, 충돌 방지를 위해 컨테이너화 될 DB는 5433을 쓰는식으로 분리하면 좋다.
    ports:
      - "${DB_PORT}:5432"

    #DB 데이터는 /var/lib/postgresql/data에 저장
    # 실제로는 Docker volume(postgres-data)에 영속화
    # 컨테이너를 지워도 DB 데이터가 유지됨
    volumes:
      - postgres-data:/var/lib/postgresql/data

      #DB 최초 실행시 schema.sql 자동 실행
      #내 pc의 schema.sql파일을 컨테이너 안 /docker-entrypoint-initdb.d/01-schema.sql로 연결해서 PostgreSQL이 실행 할 수 있게 한다.
      # 단, postgres-data 볼륨이 이미 존재하면 다시 실행되지 않음
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: monew-mongo
    ports:
      - "27017:27017"

    # MongoDB를 replica set 모드로 실행
    # 트랜잭션을 쓰려면 단일 MongoDB라도 replica set 설정이 필요함
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

    volumes:
      # MongoDB 데이터 영속화
      - mongo-data:/data/db
    healthcheck:
      # MongoDB가 응답 가능한 상태인지 확인
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # MongoDB 컨테이너가 healthy 상태가 된 뒤 replica set 초기화 실행
  mongo-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy

    # replica set 초기화는 한 번만 실행하면 되므로 재시작하지 않음
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongodb:27017 --eval "
          try {
            rs.status();
            print('Replica set already initialized.');
          } catch (e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'localhost:27017' }]
            });
            print('Replica set initialized.');
          }
        "

volumes:
  postgres-data:
  mongo-data: