  # 각자 로컬 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/monew
    username: monew
    password: monew123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/monew?replicaSet=rs0}
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

logging:
  level:
    com.springboot.monew: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
