spring:
  sql:
    init:
      schema-locations: classpath:schema.sql
  datasource:
    url: jdbc:postgresql://localhost:5433/monew
    username: monew
    password: monew123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 500
    open-in-view: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/monew-test?replicaSet=rs0
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

logging:
  level:
    com.springboot.monew: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

naver:
  api:
    key: "test-secret-key-for-build-pass"
    secret: "test-secret-key-for-build-pass"

cloud:
  aws:
    s3:
      enabled: true
      access-key: test
      secret-key: test
      region: ap-northeast-2
      bucket: test-bucket