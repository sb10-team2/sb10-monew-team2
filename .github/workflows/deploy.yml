name: MoNew Deploy Workflow

on:
  push:
    branches: ["task/#136/deploy"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
      NAVER_API_SECRET: ${{ secrets.NAVER_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew clean test --stacktrace

      #AWS CLI 자격 정보 설정임요
      #Public ECR에 배포해야되므로 region은 us-east-1
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY}}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY }}
          aws-region: us-east-1

      # 1) Public ECR 로그인 (도커에서 ECR로 푸시하는 권한을 가져와야함)
      - name: ECR Login
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws/i2p9g4j7

      # 2) 이미지 태그 구성 해시7자리 + latest/ 도커 이미지 저장소 주소.
      - name: Prepare tags
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "REPO_URI=${{ vars.ECR_REPOSITORY_URI }}" >> $GITHUB_ENV

      # 3) Docker 빌드
      # 같은 imageId를 가진 태그만 다른 image가 2개 생긴다.
      - name: Docker build
        run: |
          docker build -t "$REPO_URI:$IMAGE_TAG" -t "$REPO_URI:latest" .

      # 4) ECR 푸시
      - name: Docker push
        run: |
          docker push "$REPO_URI:$IMAGE_TAG"
          docker push "$REPO_URI:latest"