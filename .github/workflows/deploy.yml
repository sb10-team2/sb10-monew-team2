name: MoNew Deploy Workflow

on:
  pull_request:
    branches: ["main"]
    types: [closed]

#중복 배포 방지, 최신 배포만 유지
#같은 그룹끼리는 동시에 1개만 실행
#ex) dev 브랜치에 push 3번 발생 -> 마지막 push건만 실행된다.
concurrency:
  group: deploy-main
  cancel-in-progress: true    #이전 실행을 취소하고 새것을 실행한다.

#PR이 닫히고 main에 merge됐을때 배포
jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew clean build

      #AWS CLI 자격 정보 설정임요
      #Public ECR에 배포해야되므로 region은 us-east-1
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY}}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY }}
          aws-region: us-east-1

      # 1) Public ECR 로그인 (도커에서 ECR로 푸시하는 권한을 가져와야함)
      - name: ECR Login
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws/i2p9g4j7

      # 2) 이미지 태그 구성 해시7자리 + latest/ 도커 이미지 저장소 주소.
      - name: Prepare tags
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "REPO_URI=${{ vars.ECR_REPOSITORY_URI }}" >> $GITHUB_ENV

      # 3) Docker 빌드
      # 같은 imageId를 가진 태그만 다른 image가 2개 생긴다.
      - name: Docker build
        run: |
          docker build -t "$REPO_URI:$IMAGE_TAG" -t "$REPO_URI:latest" .

      # 4) ECR 푸시
      - name: Docker push
        run: |
          docker push "$REPO_URI:$IMAGE_TAG"
          docker push "$REPO_URI:latest"

      # 5) ECS 서비스 업데이트를 위한 AWS CLI 재설정: AWS_REGION 을 northeast-2로 재설정해야되기 때문
      - name: Configure AWS Credentials (ECS 리전)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      # 6) 태스크 정의 템플릿 렌더링
      - name: Render task definition
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gettext-base

          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_REGION=${{ secrets.AWS_S3_REGION }}
          export REPO_URI=${{ vars.ECR_REPOSITORY_URI }}
          export IMAGE_TAG=${GITHUB_SHA::7}

          envsubst < ecs-task-def.json > task-def.rendered.json

          echo "=== Rendered task definition ==="
          cat task-def.rendered.json

      # 7) 새 태스크 정의 등록
      - name: Register new task definition
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "NEW_TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV
          echo "Registered task definition: $TASK_DEF_ARN"

      # 8) 새 태스크 정의로 ECS 서비스 업데이트
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment

      # 9) 배포 안정화 대기
      - name: Wait for ECS service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}

      # 10) 배포 상태 확인 (디플로이먼트 요약 출력)
      - name: ECS 배포 상태 확인
        run: |
          aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query "services[0].deployments"