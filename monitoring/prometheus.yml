global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'monew-spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]
  - job_name: 'monew-cadvisor'
    static_configs:
      - targets: [ 'cadvisor:8080' ]
  - job_name: 'monew-postgres'
    static_configs:
      - targets: [ 'postgres-exporter:9187' ]
