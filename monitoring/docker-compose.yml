services:
  prometheus:
    image: prom/prometheus:latest
    container_name: monew-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: monew-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: monew-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    container_name: monew-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME="postgresql://monew:monew123@host.docker.internal:5432/monew?sslmode=disable"
